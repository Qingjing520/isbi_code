  <text x="880" y="1803" class="h">MMD</text><text x="855" y="1833" class="p">loss_topo</text>

  <rect x="1080" y="970" width="420" height="80" rx="16" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
