  <text x="1260" y="1253" class="h">MMD</text><text x="1240" y="1283" class="p">loss_txt</text>

  <rect x="1120" y="1930" width="260" height="90" rx="16" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
