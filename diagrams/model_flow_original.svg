  <rect x="420" y="2080" width="860" height="100" rx="16" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="450" y="2122" class="h">loss = loss_cls + decay * (alpha*loss_txt + beta*loss_node + gamma*loss_topo)</text>

