<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1b1f23; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .pill { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .soft-arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .group-label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1800" height="980" fill="#f8fafc"/>
  <rect x="24" y="24" width="1752" height="932" rx="28" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="70" y="82" class="title">ISBI Project: Input to Loss Flow</text>
  <text x="70" y="112" class="subtitle">Multimodal pathology classification with shared mapping, attention pooling, MoE fusion, and domain alignment losses</text>

  <text x="86" y="170" class="group-label">Inputs</text>
  <text x="470" y="170" class="group-label">Feature Encoding</text>
  <text x="920" y="170" class="group-label">Fusion and Prediction</text>
  <text x="1320" y="170" class="group-label">Losses</text>

  <rect x="70" y="210" width="260" height="120" rx="18" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="100" y="250" class="box-title">Image Features</text>
  <text x="100" y="280" class="box-text">`image_dir/slide_id.pt`</text>
  <text x="100" y="305" class="small">Patch sequence: [n, 512]</text>

  <rect x="70" y="390" width="260" height="120" rx="18" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="100" y="430" class="box-title">Text Features</text>
  <text x="100" y="460" class="box-text">`text_dir/case_id.pt`</text>
  <text x="100" y="485" class="small">Sentence/token sequence: [N, 512]</text>

  <rect x="70" y="570" width="260" height="120" rx="18" fill="#fef3c7" stroke="#fcd34d" filter="url(#shadow)"/>
  <text x="100" y="610" class="box-title">Labels</text>
  <text x="100" y="640" class="box-text">From `label.csv`</text>
  <text x="100" y="665" class="small">Used only for source classification loss</text>

  <rect x="430" y="210" width="280" height="120" rx="18" fill="#e9d5ff" stroke="#c084fc" filter="url(#shadow)"/>
  <text x="460" y="250" class="box-title">SharedMapper</text>
  <text x="460" y="280" class="box-text">Shared MLP residual blocks</text>
  <text x="460" y="305" class="small">Image and text use the same mapper</text>

  <rect x="430" y="390" width="280" height="120" rx="18" fill="#fae8ff" stroke="#d8b4fe" filter="url(#shadow)"/>
  <text x="460" y="430" class="box-title">AttentionPooling</text>
  <text x="460" y="460" class="box-text">Image branch</text>
  <text x="460" y="485" class="small">Sequence to single image vector</text>

  <rect x="430" y="570" width="280" height="120" rx="18" fill="#fae8ff" stroke="#d8b4fe" filter="url(#shadow)"/>
  <text x="460" y="610" class="box-title">AttentionPooling</text>
  <text x="460" y="640" class="box-text">Text branch</text>
  <text x="460" y="665" class="small">Sequence to single text vector</text>

  <rect x="810" y="270" width="300" height="180" rx="18" fill="#e0f2fe" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="840" y="310" class="box-title">MoEFusion</text>
  <text x="840" y="340" class="box-text">Router mixes 3 experts:</text>
  <text x="840" y="370" class="small">1. Concat + self-attention</text>
  <text x="840" y="395" class="small">2. Add + self-attention</text>
  <text x="840" y="420" class="small">3. Cross-attention</text>

  <rect x="810" y="520" width="300" height="120" rx="18" fill="#cffafe" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="840" y="560" class="box-title">StageClassifier</text>
  <text x="840" y="590" class="box-text">LayerNorm + MLP</text>
  <text x="840" y="615" class="small">Outputs logits, probs, preds</text>

  <rect x="1280" y="210" width="360" height="110" rx="18" fill="#fee2e2" stroke="#fca5a5" filter="url(#shadow)"/>
  <text x="1310" y="250" class="box-title">Classification Loss</text>
  <text x="1310" y="280" class="box-text">CrossEntropy on source labels</text>

  <rect x="1280" y="390" width="360" height="190" rx="18" fill="#ede9fe" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="1310" y="430" class="box-title">Alignment Losses</text>
  <text x="1310" y="460" class="small">Text mean features -> MMD -> loss_txt</text>
  <text x="1310" y="490" class="small">Graph node features -> MMD -> loss_node</text>
  <text x="1310" y="520" class="small">Graph topology stats -> MMD -> loss_topo</text>
  <text x="1310" y="555" class="small">Enabled after warmup epochs</text>

  <rect x="1280" y="670" width="360" height="150" rx="18" fill="#d1fae5" stroke="#6ee7b7" filter="url(#shadow)"/>
  <text x="1310" y="710" class="box-title">Total Loss</text>
  <text x="1310" y="740" class="box-text">loss = loss_cls + decay *</text>
  <text x="1310" y="770" class="small">(alpha * loss_txt + beta * loss_node + gamma * loss_topo)</text>

  <rect x="820" y="700" width="270" height="120" rx="18" fill="#f1f5f9" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="850" y="740" class="box-title">Graph Feature Builder</text>
  <text x="850" y="770" class="small">K-means nodes + top-k graph</text>
  <text x="850" y="795" class="small">1/2/3-hop topology counts</text>

  <path d="M330 270 L430 270" class="arrow"/>
  <path d="M330 450 L430 270" class="arrow"/>
  <path d="M710 270 L810 320" class="arrow"/>

  <path d="M330 270 C380 270, 380 450, 430 450" class="soft-arrow"/>
  <path d="M330 450 L430 630" class="soft-arrow"/>

  <path d="M710 450 L810 450 L810 320" class="arrow"/>
  <path d="M710 630 L810 630 L810 320" class="arrow"/>
  <path d="M1110 380 L1110 580 L810 580" class="arrow"/>
  <path d="M1110 580 L1280 265" class="arrow"/>

  <path d="M330 630 L1280 265" class="soft-arrow"/>

  <path d="M710 270 C760 270, 760 760, 820 760" class="soft-arrow"/>
  <path d="M710 450 C760 450, 760 760, 820 760" class="soft-arrow"/>
  <path d="M710 630 C760 630, 760 485, 1280 485" class="soft-arrow"/>
  <path d="M1090 760 L1280 485" class="arrow"/>

  <path d="M1640 265 L1640 745" class="arrow"/>
  <path d="M1640 485 L1640 745" class="arrow"/>

  <rect x="90" y="820" width="1030" height="90" rx="16" fill="#fff7ed" stroke="#fdba74"/>
  <text x="120" y="855" class="pill">Training logic</text>
  <text x="240" y="855" class="small">Warmup first, then add alignment losses. Best checkpoint is selected by target AUC (fallback to ACC).</text>
  <text x="240" y="882" class="small">Current code evaluates on the target/test loader each epoch, so the target split acts like a validation signal.</text>
</svg>
