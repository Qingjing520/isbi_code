seed: 23

data:
  # Default example: KIRC + concept graph.
  split_file: "F:\\Tasks\\Split_Table\\KIRC\\split_0.csv"
  label_file: "F:\\Tasks\\Pathologic_Stage_Label\\KIRC_pathologic_stage.csv"
  image_dir: "F:\\Tasks\\WSI_extract_features\\KIRC_WSI_extract_features"
  text_dir: "F:\\Tasks\\isbi_code\\pathology_report_extraction\\Output\\text_concept_graphs_masked\\KIRC"

  # Supported text modes:
  # - sentence_pt: original case-level sentence feature tensor.
  # - hierarchy_graph: Document/Section/Sentence graph tensor.
  # - concept_graph: hierarchy graph with ontology concept nodes.
  # - dual_text: raw sentence branch plus graph branch.
  text_mode: concept_graph
  sentence_text_dir: "F:\\Tasks\\Text_Sentence_extract_features\\KIRC_text"
  graph_text_dir: "F:\\Tasks\\isbi_code\\pathology_report_extraction\\Output\\text_concept_graphs_masked\\KIRC"

  # Preferred for hierarchy_graph / concept_graph / dual_text graph branch.
  graph_manifest_csv: "F:\\Tasks\\isbi_code\\pathology_report_extraction\\Output\\manifests\\kirc_concept_graph_manifest_split0.csv"

  # Graph feature choices:
  # - node_features: Document + Section + Sentence + optional Concept nodes.
  # - sentence_features: sentence nodes only.
  # - section_features: section nodes only.
  # - document_feature: document node only.
  text_graph_feature: node_features

  # false: read graph features as a plain feature sequence.
  # true: use edge_index / edge_type / node_type with the text graph encoder.
  text_use_graph_structure: true

  # Common path examples:
  # BRCA hierarchy graph:
  #   split_file: "F:\\Tasks\\Split_Table\\BRCA\\split_149.csv"
  #   label_file: "F:\\Tasks\\Pathologic_Stage_Label\\BRCA_pathologic_stage.csv"
  #   text_dir: "F:\\Tasks\\Pathology_Report_Hierarchy_Graphs\\BRCA\\basic_hierarchy"
  #   text_mode: hierarchy_graph
  # KIRC sentence-only:
  #   split_file: "F:\\Tasks\\Split_Table\\KIRC\\split_0.csv"
  #   label_file: "F:\\Tasks\\Pathologic_Stage_Label\\KIRC_pathologic_stage.csv"
  #   text_dir: "F:\\Tasks\\Text_Sentence_extract_features\\KIRC_text"
  #   text_mode: sentence_pt
  # LUSC sentence-only:
  #   split_file: "F:\\Tasks\\Split_Table\\LUSC\\split_149.csv"
  #   label_file: "F:\\Tasks\\Pathologic_Stage_Label\\LUSC_pathologic_stage.csv"
  #   text_dir: "F:\\Tasks\\Text_Sentence_extract_features\\LUSC_text"
  #   text_mode: sentence_pt

graph:
  num_nodes_m: 64
  topk_k: 16
  kmeans_iters: 10
  max_patches_for_kmeans: 2048

model:
  feat_dim: 512
  mapper_hidden: 1024
  mapper_depth: 2
  mapper_dropout: 0.1
  attn_pool_hidden: 256
  attn_pool_dropout: 0.1
  moe_heads: 8
  moe_dropout: 0.1
  moe_tau_start: 1.0
  moe_tau_min: 0.1
  moe_tau_decay: 0.95
  moe_hard_start_epoch: 10
  classifier_hidden: 256
  classifier_dropout: 0.2

  # Graph-text encoder settings.
  text_graph_layers: 1
  text_graph_dropout: 0.05
  text_graph_use_next_edges: true
  text_graph_num_node_types: 0
  text_graph_num_base_relations: 0

  # Dual-text branch settings.
  sentence_local_layers: 1
  sentence_local_heads: 8
  hier_readout_hidden: 256
  hier_readout_dropout: 0.1

  # Section titles encode the role/context of each report section. Keep false
  # for exact legacy runs; use true for controlled hierarchy/ontology ablations.
  use_section_title_embedding: false
  section_title_vocab:
    - Document Body
    - Diagnosis
    - Final Diagnosis
    - Gross Description
    - Microscopic Description
    - Comment
    - Clinical Information
    - Specimen Submitted
    - Synoptic Report
    - Procedure
    - Ancillary Studies
    - Patient History
    - Summary of Sections
    - Intraoperative Consultation
  text_dual_fusion_dropout: 0.1

  # Keep 1.0 for old unrestricted fusion. Use 0.2-0.3 when concept graphs
  # should only act as an auxiliary signal beside the raw sentence branch.
  text_dual_graph_weight_max: 1.0
  text_dual_fusion_mode: convex  # convex or residual

text_graph:
  # Bounded residual graph gate. With residual fusion, the text vector is:
  # sentence_vec + gate * graph_vec. Keep small for noise-aware experiments.
  gate_init: 0.1
  gate_max: 0.3

hierarchy:
  enabled: false
  use_section_edges: true
  use_sentence_similarity_edges: true
  sentence_topk: 5
  min_sentence_sim: 0.3
  edge_dropout: 0.1
  max_sentences_per_report: 128

ontology:
  enabled: false
  max_concepts_per_report: 30
  min_concept_confidence: 0.7
  remove_generic_concepts: true
  remove_leakage_concepts: true
  allowed_semantic_types: []
  edge_hop_limit: 1
  edge_dropout: 0.2
  evidence_only: false
  evidence_keywords:
    - tumor size
    - size
    - invasion
    - invasive
    - lymph node
    - lymph nodes
    - lymphatic
    - nodal
    - margin
    - margins
    - metastasis
    - metastatic
    - anatomic extent
    - extension
    - extranodal
    - capsule
    - vascular invasion
    - lymphovascular invasion
    - perineural invasion
  evidence_deny_keywords:
    - estrogen receptor
    - progesterone receptor
    - hormone receptor
    - er
    - pr
    - her2
    - immunohistochemistry
    - procedure
    - mastectomy
    - biopsy
    - carcinoma
    - adenocarcinoma
    - neoplasm
  generic_concept_denylist:
    - Disease
    - Neoplasm
    - Patient
    - Procedure
    - Finding
    - Clinical finding
    - Body structure
  leakage_concept_denylist:
    - stage
    - staging
    - pathologic stage
    - TNM
    - AJCC
    - grade

loss:
  warmup_epochs: 3
  align_decay_to: 0.3
  alpha_txt: 0.5
  alpha_concept: 0.2
  beta_node: 0.1
  gamma_topo: 0.1
  gamma_text_topology: 0.05
  dual_text_gate_reg_weight: 0.0
  dual_text_graph_weight_target: 0.1
  mmd_num_kernels: 3
  mmd_sigma_multipliers:
    - 0.5
    - 1.0
    - 2.0
  mmd_unbiased: true
  mmd_clamp_nonneg: true
  graph_aux_align_enabled: false
  graph_aux_align_weight: 0.01
  graph_aux_align_warmup_epochs: 8
  graph_aux_align_conf_threshold: 0.7
  graph_aux_align_decay_to: 0.2

train:
  num_epochs: 60
  batch_size: 4
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.01
  grad_clip: 1.0
  early_stop_patience: 10
  early_stop_min_delta: 0.0001

output:
  exp_dir: "F:\\Tasks\\isbi_code\\experiments\\kirc_split0_ncit_concept_graph"
  save_best_by: val_avg
