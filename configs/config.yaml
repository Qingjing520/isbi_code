seed: 23

data:
  # =========================
  # 这一个 yaml 就是训练总配置入口
  # 以后只改这里，不需要再切换别的 yaml
  # =========================

  # 当前默认示例：
  # KIRC + 层次图文本特征（hierarchy_graph）
  split_file: D:\Tasks\Split_Table\KIRC\split_0.csv
  label_file: D:\Tasks\Pathologic_Stage_Label\KIRC_pathologic_stage.csv
  image_dir: D:\Tasks\WSI_extract_features\KIRC_WSI_extract_features
  text_dir: D:\Tasks\isbi_code\pathology_report_extraction\Output\text_hierarchy_graphs_masked\KIRC

  # 文本模式三选一：
  # 1. sentence_pt
  #    论文原始方式，读取 case-level 句子特征 pt
  #    例如：
  #    D:\Tasks\text_extract_features\KIRC_text
  #    D:\Tasks\text_extract_features\BRCA_text
  #    D:\Tasks\text_extract_features\LUSC_text
  #
  # 2. hierarchy_graph
  #    当前新增方式，读取层次图 pt 字典
  #    例如：
  #    D:\Tasks\isbi_code\pathology_report_extraction\Output\text_hierarchy_graphs_masked\KIRC
  #    D:\Tasks\isbi_code\pathology_report_extraction\Output\text_hierarchy_graphs_masked\BRCA
  #
  # 3. dual_text
  #    双路文本模式：
  #    - sentence_text_dir 读取原论文句子特征
  #    - graph_text_dir 读取层次图
  #    二者先在文本侧融合，再与 WSI 融合
  text_mode: dual_text
  sentence_text_dir: D:\Tasks\Text_Sentence_extract_features\KIRC_text
  graph_text_dir: D:\Tasks\isbi_code\pathology_report_extraction\Output\text_hierarchy_graphs_masked\KIRC

  # 只有在 text_mode: hierarchy_graph 时才会使用这个字段
  # 可选：
  # - node_features: Document + Section + Sentence 三层节点一起作为文本输入
  # - sentence_features: 只用句子节点特征
  # - section_features: 只用 section 节点特征
  # - document_feature: 只用 document 节点特征（会自动扩成 1 x 512）
  text_graph_feature: node_features
  # false: 旧行为，只把层次图里的某个特征张量当作序列输入
  # true:  新行为，显式使用 edge_index / edge_type / node_type 做图结构编码
  text_use_graph_structure: false

  # -------------------------
  # 常见切换示例
  # -------------------------
  #
  # A. 切到 BRCA + 层次图文本：
  # split_file: D:\Tasks\Split_Table\BRCA\split_149.csv
  # label_file: D:\Tasks\Pathologic_Stage_Label\BRCA_pathologic_stage.csv
  # text_dir: D:\Tasks\isbi_code\pathology_report_extraction\Output\text_hierarchy_graphs_masked\BRCA
  # text_mode: hierarchy_graph
  # text_graph_feature: node_features
  #
  # B. 切到 KIRC + 原论文句子文本：
  # split_file: D:\Tasks\Split_Table\KIRC\split_0.csv
  # label_file: D:\Tasks\Pathologic_Stage_Label\KIRC_pathologic_stage.csv
  # text_dir: D:\Tasks\text_extract_features\KIRC_text
  # text_mode: sentence_pt
  #
  # C. 切到 BRCA + 原论文句子文本：
  # split_file: D:\Tasks\Split_Table\BRCA\split_149.csv
  # label_file: D:\Tasks\Pathologic_Stage_Label\BRCA_pathologic_stage.csv
  # text_dir: D:\Tasks\text_extract_features\BRCA_text
  # text_mode: sentence_pt
  #
  # D. 切到 LUSC + 原论文句子文本：
  # split_file: D:\Tasks\Split_Table\LUSC\split_149.csv
  # label_file: D:\Tasks\Pathologic_Stage_Label\LUSC_pathologic_stage.csv
  # text_dir: D:\Tasks\text_extract_features\LUSC_text
  # text_mode: sentence_pt
  #
  # 注意：
  # - image_dir 需要填真实的 WSI 特征 pt 目录，多模态训练才可正常运行
  # - label_file 现在统一使用与 LUSC 相同格式：case_id, slide_id, label

graph:
  num_nodes_m: 64
  topk_k: 16
  kmeans_iters: 10
  max_patches_for_kmeans: 2048

model:
  feat_dim: 512
  mapper_hidden: 1024
  mapper_depth: 2
  mapper_dropout: 0.1
  attn_pool_hidden: 256
  attn_pool_dropout: 0.1
  moe_heads: 8
  moe_dropout: 0.1
  moe_tau_start: 1.0
  moe_tau_min: 0.1
  moe_tau_decay: 0.95
  moe_hard_start_epoch: 10
  classifier_hidden: 256
  classifier_dropout: 0.2
  # 仅在 data.text_mode=hierarchy_graph 且 data.text_use_graph_structure=true 时生效
  text_graph_layers: 1
  text_graph_dropout: 0.05
  # true: 使用 parent + next 两类边
  # false: 只使用 parent 父子边
  text_graph_use_next_edges: true
  # dual_text 分支配置
  sentence_local_layers: 1
  sentence_local_heads: 8
  hier_readout_hidden: 256
  hier_readout_dropout: 0.1
  text_dual_fusion_dropout: 0.1

loss:
  warmup_epochs: 3
  align_decay_to: 0.3
  alpha_txt: 0.5
  beta_node: 0.1
  gamma_topo: 0.1
  # dual_text 专用，可选 gate 正则。
  # fusion_gate 是 sentence 分支权重，所以 graph 分支权重 = 1 - fusion_gate。
  # 默认 0.0 表示关闭；做消融时可试 0.01 或 0.02，把 graph 分支目标权重推到 0.2 左右。
  dual_text_gate_reg_weight: 0.0
  dual_text_graph_weight_target: 0.2
  mmd_num_kernels: 3
  mmd_sigma_multipliers:
    - 0.5
    - 1.0
    - 2.0
  mmd_unbiased: true
  mmd_clamp_nonneg: true

train:
  num_epochs: 60
  batch_size: 4
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.01
  grad_clip: 1.0
  early_stop_patience: 10
  early_stop_min_delta: 0.0001

output:
  # 建议按实验自行改名，避免覆盖
  # 例如：
  # D:\Tasks\isbi_code\experiments\kirc_split0_hierarchy_graph
  # D:\Tasks\isbi_code\experiments\brca_split149_sentence_pt
  exp_dir: D:\Tasks\isbi_code\experiments\kirc_split0_hierarchy_graph
  save_best_by: val_avg
