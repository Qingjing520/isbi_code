# pathology_report_extraction 总控配置文件。
# 以后主要改这一个 yaml，就可以切换模式或调整整条流程参数。
#
# 阶段顺序：
# 1. preprocess
# 2. export_sentence_views
# 3. extract_ontology_concepts（可选）
# 4. encode_sentence_exports_conch
# 5. build_text_hierarchy_graphs
# 6. prepare_text_graph_manifest（可选，默认关闭）

defaults:
  # 原始病理报告 PDF 根目录。
  input_dir: F:\Tasks\Pathology Report

  # 统一输出根目录。所有阶段的结果都会写到这里。
  output_root: F:\Tasks\isbi_code\pathology_report_extraction\Output

  # 全局调试上限。留空表示全量运行。
  limit:

preprocess:
  enabled: true

  # 预处理模式。
  # 推荐主实验使用 masked。
  # 可选值：full / no_diagnosis / masked / no_diagnosis_masked
  filter_mode: masked

  # 当页面原生提取字符数低于该阈值时，自动启用 OCR。
  native_char_threshold: 40

  # OCR 回退时的 PDF 栅格化放大倍率。
  ocr_zoom: 2.0

  # 不同 filter_mode 对应的预处理输出子目录。
  # 一般不需要改，切换 filter_mode 时会自动切换到对应目录。
  output_subdirs:
    masked: pathology_report_preprocessed_masked
    no_diagnosis: pathology_report_preprocessed_no_diagnosis
    no_diagnosis_masked: pathology_report_preprocessed_no_diagnosis_masked
    full: pathology_report_preprocessed_full

export_sentence_views:
  enabled: true

  # 是否额外导出便于人工查看的 txt 文件。
  write_txt: true

  # 如果不手动指定 input_dir，就自动接上 preprocess 的输出目录。
  # input_dir:

  # 如果不手动指定 output_dir，就自动使用：
  # output_root + output_subdirs[当前 filter_mode]
  # output_dir:
  output_subdirs:
    masked: sentence_exports_masked
    no_diagnosis: sentence_exports_no_diagnosis
    no_diagnosis_masked: sentence_exports_no_diagnosis_masked
    full: sentence_exports_full

extract_ontology_concepts:
  # 这一步默认打开。
  # 当前默认使用 NCIt 作为主 ontology，为后续 concept graph 构建提供离线 concept annotation。
  enabled: true

  # 当前默认：使用已经转换好的 NCIt project ontology JSON。
  ontology_path: F:\Tasks\Ontologies\processed\ablations\ncit_do_ontology.json

  # 是否展开 true-path，把 direct concept 的祖先概念一起写入 annotation。
  include_true_path: true

  # ontology 缺少 ic 时使用的默认值。
  default_ic: 1.0

  # 如果不手动指定 input_dir，就自动接上 sentence export 输出目录。
  # input_dir:

  # 如果不手动指定 output_dir，就自动使用：
  # output_root + output_subdirs[当前 filter_mode]
  # output_dir:
  output_subdirs:
    masked: concept_annotations_masked
    no_diagnosis: concept_annotations_no_diagnosis
    no_diagnosis_masked: concept_annotations_no_diagnosis_masked
    full: concept_annotations_full

encode_sentence_exports_conch:
  enabled: true

  # 本地 CONCH 仓库和权重文件路径。
  conch_repo_dir: F:\Tasks\CLAM-master
  checkpoint_path: F:\Tasks\CLAM-master\ckpts\pytorch_model.bin

  # 句子编码 batch size。
  batch_size: 64

  # 设备选择：auto / cuda / cpu。
  device: auto

  # 如果不手动指定 input_dir，就自动接上句子导出结果目录。
  # input_dir:

  # 如果不手动指定 output_dir，就自动使用：
  # output_root + output_subdirs[当前 filter_mode]
  # output_dir:
  output_subdirs:
    masked: sentence_embeddings_conch_masked
    no_diagnosis: sentence_embeddings_conch_no_diagnosis
    no_diagnosis_masked: sentence_embeddings_conch_no_diagnosis_masked
    full: sentence_embeddings_conch_full

build_text_hierarchy_graphs:
  enabled: true

  # 当前默认：打开 concept-enhanced graph
  # Document -> Section -> Sentence -> Concept
  attach_concepts: true

  # concept annotation 目录。留空时默认接 extract_ontology_concepts 的输出目录。
  # concept_dir:

  # true: 添加 concept-concept 的同句 / 同 section 共现边
  # false: 只保留 mention + ontology 边
  add_concept_cooccurrence_edges: true

  # 如果不手动指定 input_dir，就自动接上 CONCH 编码输出目录。
  # input_dir:

  # 如果不手动指定 output_dir，就自动使用：
  # output_root + output_subdirs[当前 filter_mode]
  # output_dir:
  output_subdirs:
    masked: text_concept_graphs_masked
    no_diagnosis: text_concept_graphs_no_diagnosis
    no_diagnosis_masked: text_concept_graphs_no_diagnosis_masked
    full: text_concept_graphs_full

prepare_text_graph_manifest:
  # 这一步默认关闭。
  # 需要时可改成 true，用于把文本图和标签整理成训练 manifest。
  enabled: false

  # 分期标签文件。需要包含 case_id, slide_id, label 三列。
  label_csv: F:\Tasks\pathologic_stage.csv

  # 可选的 split 文件。
  # 支持：
  # 1. 列格式 slide_id, split
  # 2. 列格式 case_id, split
  # 3. 原项目那种 train / val / test 三列格式
  split_csv:

  # 可选的图像特征目录。
  # 如果填写，会在 manifest 里额外记录 image_pt 和 image_exists。
  image_dir:

  # graph_dir 留空时，默认接上 build_text_hierarchy_graphs 的输出目录。
  # graph_dir:

  # manifest 输出目录。留空时默认写到 Output\manifests
  # output_dir:
  output_subdir: manifests

  # manifest 输出文件名。留空时自动按模式命名：
  # text_graph_manifest_masked.csv
  output_name:
